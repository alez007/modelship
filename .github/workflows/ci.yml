name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # Detect whether this PR touches the Helm chart, so the heavy `chart` job (which
  # spins up a kind cluster) only runs when it's relevant.
  changes:
    runs-on: ubuntu-latest
    outputs:
      chart: ${{ steps.filter.outputs.chart }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            chart:
              - 'helm/**'
              - '.github/workflows/ci.yml'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra gpu

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      # The gpu extra's llama-cpp-python wheel (cu130) statically links libcuda.so.1
      # and fails to import at all without it, even for CPU-only test configs. This
      # runner has no GPU/driver, so provide NVIDIA's official stub libcuda.so (from
      # cuda-driver-dev, meant for driverless build/CI environments): its cuInit()
      # returns CUDA_ERROR_STUB_LIBRARY instead of crashing, which is enough to let
      # the module load. See CLAUDE.md sharp edges for details.
      - name: Install CUDA driver stub for llama-cpp-python import
        run: |
          curl -sSL -o /tmp/cuda-driver-dev.deb \
            https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-driver-dev-13-0_13.0.96-1_amd64.deb
          dpkg-deb -x /tmp/cuda-driver-dev.deb /tmp/cuda-stub
          stub_dir=/tmp/cuda-stub/usr/local/cuda-13.0/targets/x86_64-linux/lib/stubs
          ln -s libcuda.so "$stub_dir/libcuda.so.1"
          echo "LD_LIBRARY_PATH=$stub_dir:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv sync --extra dev --extra gpu

      - name: Run tests
        run: uv run pytest tests/ -v -m "not integration"

  chart:
    needs: changes
    if: needs.changes.outputs.chart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Lint chart
        run: |
          helm repo add kuberay https://ray-project.github.io/kuberay-helm/
          helm dependency build helm/modelship
          # helm 3.16 leaves only the .tgz in charts/; template/lint need the dir form.
          ( cd helm/modelship/charts && for f in *.tgz; do tar xzf "$f"; done )
          helm lint helm/modelship

      - name: Validate rendered manifests (kubeconform)
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform
          # CRDs (RayCluster/RayJob/PodMonitor) aren't in the standard schema set, so
          # skip those and validate everything else strictly across value permutations.
          for args in \
            "" \
            "--set image.variant=cpu" \
            "--set redis.enabled=true --set redis.address=cache:6379 --set redis.password=pw" \
            "--set podMonitor.enabled=true"; do
            echo "== helm template $args =="
            helm template modelship helm/modelship $args \
              | kubeconform -strict -ignore-missing-schemas -summary
          done

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: modelship-ci

      - name: Server dry-run against real KubeRay CRDs
        run: |
          # Install the operator so the RayCluster/RayJob CRDs exist, then server-side
          # dry-run the chart: the API server validates the CRs (incl.
          # gcsFaultToleranceOptions) against the real CRD schemas. Head-only (no
          # workers/cache) so nothing needs GPUs or PVCs.
          helm install kuberay-operator kuberay/kuberay-operator --wait --timeout 5m
          for redis in "false" "true"; do
            echo "== dry-run redis.enabled=$redis =="
            helm install modelship helm/modelship \
              --set kuberay-operator.enabled=false \
              --set cache.enabled=false \
              --set redis.enabled=$redis \
              --set redis.address=cache:6379 \
              --set redis.password=pw \
              --dry-run=server
          done
