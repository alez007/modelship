name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write   # create GitHub Releases
  packages: write   # push to GHCR

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # CPU image builds and pushes first so the lightweight variant is available
      # in the registry before the slower GPU build runs.
      - name: Build and push (CPU)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PYTHON_VERSION=3.12.10
            MSHIP_VARIANT=cpu
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-cpu
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (GPU)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: prod
          platforms: linux/amd64
          push: true
          build-args: |
            CUDA_VERSION=12.8.1
            PYTHON_VERSION=3.12.10
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    runs-on: ubuntu-latest
    # After docker so a published chart's image tag always exists in GHCR.
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Log in to GHCR
        run: helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}

      # Vendor the kuberay-operator subchart (pinned in Chart.lock) before packaging
      # so `--set kuberay-operator.enabled=true` works from the published chart.
      # helm 3.16 leaves only the .tgz in charts/, which template/lint/package don't
      # accept — extract it to the directory form they require.
      - name: Build chart dependencies
        run: |
          helm repo add kuberay https://ray-project.github.io/kuberay-helm/
          helm dependency build helm/modelship
          ( cd helm/modelship/charts && for f in *.tgz; do tar xzf "$f"; done )

      # Chart version is stamped to the app version at release time (make _release),
      # so it equals the tag and packages to modelship-<version>.tgz.
      - name: Package chart
        run: helm package helm/modelship

      - name: Push chart to GHCR (OCI)
        run: |
          helm push "modelship-${{ needs.docker.outputs.version }}.tgz" \
            "oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"

  github-release:
    runs-on: ubuntu-latest
    needs: [docker, helm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker images

            ### GPU (Standard)
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.docker.outputs.version }}
            ```

            ### CPU (Lightweight)
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.docker.outputs.version }}-cpu
            ```

            ## Helm chart (Kubernetes)

            ```bash
            helm install modelship \
              oci://ghcr.io/${{ github.repository_owner }}/charts/modelship \
              --version ${{ needs.docker.outputs.version }} \
              -f values.yaml
            ```

            ## Configuration

            Create a `models.yaml` file and mount it at `/modelship/config/models.yaml`. Example configs for various GPU sizes are included in the image under `/modelship/config/` — use them as a reference for structure and available options, then tailor the models and GPU fractions to your hardware.
