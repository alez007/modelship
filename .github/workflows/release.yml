name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write   # create GitHub Releases
  packages: write   # push to GHCR

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  docker:
    runs-on: ubuntu-latest
    needs: version
    strategy:
      # Cheapest-first: thin has no torch/vllm, cpu is the mid-weight build,
      # cuda is the slowest. max-parallel: 1 keeps them sequential in this
      # order so the lightest variant lands in the registry first.
      max-parallel: 1
      matrix:
        include:
          - variant: thin
            target: prod-thin
            platforms: linux/amd64,linux/arm64
            tag_suffix: ""
          - variant: cpu
            target: prod
            platforms: linux/amd64,linux/arm64
            tag_suffix: "-cpu"
          - variant: cuda
            target: prod
            platforms: linux/amd64
            tag_suffix: "-cuda"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platforms }}
          push: true
          build-args: |
            MSHIP_VARIANT=${{ matrix.variant }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}${{ matrix.tag_suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest${{ matrix.tag_suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    runs-on: ubuntu-latest
    # After docker so a published chart's image tag always exists in GHCR.
    needs: [version, docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Log in to GHCR
        run: helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}

      # Vendor the kuberay-operator subchart (pinned in Chart.lock) before packaging
      # so `--set kuberay-operator.enabled=true` works from the published chart.
      # helm 3.16 leaves only the .tgz in charts/, which template/lint/package don't
      # accept — extract it to the directory form they require.
      - name: Build chart dependencies
        run: |
          helm repo add kuberay https://ray-project.github.io/kuberay-helm/
          helm dependency build helm/modelship
          ( cd helm/modelship/charts && for f in *.tgz; do tar xzf "$f"; done )

      # Chart version is stamped to the app version at release time (make _release),
      # so it equals the tag and packages to modelship-<version>.tgz.
      - name: Package chart
        run: helm package helm/modelship

      - name: Push chart to GHCR (OCI)
        run: |
          helm push "modelship-${{ needs.version.outputs.version }}.tgz" \
            "oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"

  github-release:
    runs-on: ubuntu-latest
    needs: [version, docker, helm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker images

            ### Thin (control/coordinator — default, no torch/vllm)
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            ```

            ### CUDA (GPU node)
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}-cuda
            ```

            ### CPU (CPU node)
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}-cpu
            ```

            Floating tags (`:latest`, `:latest-cuda`, `:latest-cpu`) are single-node only — for any
            multi-node cluster, pin every node to the same `X.Y.Z` tag to avoid a Ray version
            mismatch between head and workers.

            ## Helm chart (Kubernetes)

            ```bash
            helm install modelship \
              oci://ghcr.io/${{ github.repository_owner }}/charts/modelship \
              --version ${{ needs.version.outputs.version }} \
              -f values.yaml
            ```

            ## Configuration

            Create a `models.yaml` file and mount it at `/modelship/config/models.yaml`. Example configs for various GPU sizes are included in the image under `/modelship/config/` — use them as a reference for structure and available options, then tailor the models and GPU fractions to your hardware.
