models:
  - name: "llm"
    model: "lmstudio-community/Qwen2.5-7B-Instruct-GGUF:*Q4_K_M.gguf"
    # bench-tokenizer: Qwen/Qwen2.5-7B-Instruct
    usecase: "generate"
    loader: "llama_server"
    num_gpus: 0
    num_cpus: 8
    # Lift Ray Serve's per-replica concurrency cap (default 100) so the model
    # deployment isn't the bottleneck during the sweep.
    max_ongoing_requests: 256
    # Note: the bench runs modelship with MSHIP_PREFLIGHT=false, so both phases
    # use loader defaults for unset fields; explicit values here are read
    # identically by both.
    llama_server_config:
      # Concurrent llama-server request slots — must cover --concurrency (8 by
      # default) so requests overlap instead of queuing behind a full set of
      # slots, which would understate throughput for both phases equally but
      # muddy the TTFT/ITL comparison with queue-wait time.
      parallel: 8
      # n_gpu_layers is irrelevant here: the loader forces `-ngl 0` for any
      # num_gpus: 0 deploy regardless of this field (see llama_server_infer.py
      # and rawllama_entrypoint.py, which mirrors that branch), so both phases
      # run CPU-only either way.
      # NOTE: the baseline arm drops ~4-7% of requests with ServerDisconnectedError
      # because the bench client hits llama-server's cpp-httplib keep-alive close
      # behaviour directly, while the modelship arm faces Ray Serve's uvicorn front
      # door and never does. This is NOT tunable away via llama-server flags
      # (--threads-http sizes the worker pool, not the keep-alive lifecycle, and
      # was verified ineffective), so there is no extra_args mitigation here. The
      # asymmetry is real and in modelship's favour: assert_result_parity compares
      # drop/truncation counts BETWEEN the two arms — the baseline dropping more is
      # reported as a FINDING (run passes), and only modelship dropping MORE than
      # the baseline hard-fails. (The load client runs greedy, --temperature 0, so
      # both arms process an identical token stream and any shared engine-level
      # in-band error shows up in both rather than landing randomly on one.)
