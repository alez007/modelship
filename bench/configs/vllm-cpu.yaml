models:
  - name: "llm"
    # Unquantized (not -AWQ): this vllm+cpu wheel doesn't ship the CPU AWQ/GPTQ
    # kernels (cpu_gemm_wna16 / int4_scaled_mm_cpu aren't in torch.ops._C), so
    # any AWQ model crashes at engine warmup on the vllm CPU backend.
    model: "Qwen/Qwen2.5-7B-Instruct"
    usecase: "generate"
    loader: "vllm"
    num_gpus: 0
    num_cpus: 8
    # Lift Ray Serve's per-replica concurrency cap (default 100) so the model
    # deployment isn't the bottleneck during the sweep.
    max_ongoing_requests: 256
    # Note: the bench runs modelship with MSHIP_PREFLIGHT=false, so both phases
    # use loader defaults for unset fields; explicit values here are read
    # identically by both.
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      max_model_len: 8192
      # vLLM's CPU backend repurposes this as the fraction of HOST RAM to
      # reserve for the KV cache (not VRAM) — set explicitly (rather than
      # relying on modelship's num_gpus==0 default of 0.4) since the raw
      # phase reads this field verbatim and must match. See
      # config/examples/vllm-cpu.yaml.
      gpu_memory_utilization: 0.4
