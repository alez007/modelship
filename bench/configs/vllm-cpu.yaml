models:
  - name: "llm"
    model: "Qwen/Qwen2.5-7B-Instruct-AWQ"
    usecase: "generate"
    loader: "vllm"
    num_gpus: 0
    num_cpus: 8
    # Lift Ray Serve's per-replica concurrency cap (default 100) so the model
    # deployment isn't the bottleneck during the sweep.
    max_ongoing_requests: 256
    vllm_engine_kwargs:
      tensor_parallel_size: 1
      max_model_len: 8192
      # vLLM's CPU backend repurposes this as the fraction of HOST RAM to
      # reserve for the KV cache (not VRAM) — set explicitly (rather than
      # relying on modelship's num_gpus==0 default of 0.4) since the raw
      # phase reads this field verbatim and must match. See
      # config/examples/vllm-cpu.yaml.
      gpu_memory_utilization: 0.4
