# llama.cpp loader examples — CPU-only GGUF inference.
# Ideal for quantized models on laptops, mini-PCs, and ARM hardware.

models:
  # Chat: GGUF pulled from a HuggingFace repo (glob after `:` picks the right quant)
  - name: "qwen"
    model: "lmstudio-community/Qwen2.5-7B-Instruct-GGUF:*Q4_K_M.gguf"
    usecase: "generate"
    loader: "llama_cpp"
    num_cpus: 3

  # Chat: GGUF from a local path (bind-mount the directory into the container)
  - name: "llama3-local"
    model: "/.cache/huggingface/llama-3-8b-instruct.Q4_K_M.gguf"
    usecase: "generate"
    loader: "llama_cpp"
    num_cpus: 4
    llama_cpp_config:
      n_ctx: 4096
      n_batch: 512

  # Tool calling: FunctionGemma emits a custom `call:FUNC{...}` syntax. The
  # tool-call parser is auto-detected from the model. Tool behavior is driven per
  # request by the OpenAI `tool_choice` parameter — there is no deploy-level flag:
  #   - sending `tools` auto-constrains decoding with a GBNF grammar (caps the call
  #     count, pins the tool name, constrains enum args), stopping the runaway
  #     repetition small (270M) checkpoints fall into. Free-text stays reachable.
  #   - `tool_choice: "required"` (or a named function) forces a tool call by
  #     dropping the free-text branch — helps tiny checkpoints that decline to act.
  - name: "function-gemma"
    model: "/.cache/huggingface/functiongemma-270m-it.Q8_0.gguf"
    usecase: "generate"
    loader: "llama_cpp"
    num_cpus: 2

  # Embeddings
  - name: "nomic-embed"
    model: "nomic-ai/nomic-embed-text-v1.5-GGUF:nomic-embed-text-v1.5.Q4_K_M.gguf"
    usecase: "embed"
    loader: "llama_cpp"
    num_cpus: 2
