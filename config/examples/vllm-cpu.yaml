# vLLM loader on CPU — no GPU required.
#
# The main use case today: gemma models can't be tool-called through the
# llama_server loader (llama.cpp's own parsers don't support it), but work
# fine through vllm. This is NOT a way to run your existing GGUF gemma file
# on CPU — the vllm loader rejects .gguf unconditionally, GPU or CPU. You
# need a non-GGUF checkpoint: safetensors, or an AWQ/GPTQ/compressed-tensors
# quant (CPU backend supports AWQ/GPTQ on x86, plus INT8 W8A8). Look for a
# community AWQ/GPTQ repack of the gemma model you want, or use the full
# safetensors checkpoint if you have the RAM for it.
#
# gpu_memory_utilization means something different here than on GPU: vLLM's
# CPU backend repurposes it as the fraction of HOST RAM to reserve for the KV
# cache, not VRAM. modelship defaults it to 0.4 for num_gpus: 0 deploys (the
# GPU-oriented 0.9 default would ask to reserve 90% of node RAM and fail at
# worker init on a real machine) — set it explicitly here to whatever your
# box can spare. For finer control, vLLM also reads VLLM_CPU_KVCACHE_SPACE
# (a fixed GiB budget instead of a RAM fraction) and VLLM_CPU_OMP_THREADS_BIND
# from the process environment directly; see docs/model-configuration.md.
#
# See docs/model-configuration.md for the full vllm_engine_kwargs reference.

models:
  - name: "gemma-cpu"
    model: "org/gemma-3-AWQ"  # replace with a real non-GGUF gemma checkpoint
    usecase: "generate"
    loader: "vllm"
    num_gpus: 0
    num_cpus: 4
    vllm_engine_kwargs:
      max_model_len: 8192
      enable_auto_tool_choice: true
      tool_call_parser: "functiongemma"
      gpu_memory_utilization: 0.4
