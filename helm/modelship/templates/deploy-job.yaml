apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "modelship.fullname" . }}-deploy
  labels:
    {{- include "modelship.labels" . | nindent 4 }}
  annotations:
    # Run after the RayCluster is applied, on install and every upgrade. Deleting
    # the previous Job before creating the new one sidesteps Job immutability and
    # makes `helm upgrade` re-apply models.yaml. A failed Job is kept for
    # inspection until the next upgrade.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.deploy.backoffLimit }}
  {{- if .Values.deploy.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.deploy.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "modelship.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Block until the Ray head's GCS port answers — KubeRay may still be
      # pulling images / starting pods when the hook fires.
      initContainers:
        - name: wait-for-head
          image: {{ include "modelship.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              until (exec 3<>/dev/tcp/{{ include "modelship.headServiceName" . }}/{{ .Values.redisPort }}) 2>/dev/null; do
                echo "waiting for ray head GCS at {{ include "modelship.headServiceName" . }}:{{ .Values.redisPort }}..."
                sleep 3
              done
              echo "ray head reachable"
      containers:
        - name: deploy
          image: {{ include "modelship.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /modelship
          command: ["uv", "run", "--no-sync", "mship_deploy.py"]
          args:
            - --use-existing-ray-cluster
            - --ray-cluster-address
            - {{ include "modelship.headServiceName" . | quote }}
            - --ray-redis-port
            - {{ .Values.redisPort | quote }}
            - --gateway-name
            - {{ .Values.gateway.name | quote }}
            - --config
            - /etc/modelship/models.yaml
            - --replace-strategy
            - {{ .Values.deploy.replaceStrategy | quote }}
            {{- if .Values.deploy.reconcile }}
            - --reconcile
            {{- end }}
            {{- if not .Values.metrics.enabled }}
            - --no-metrics
            {{- end }}
            {{- with .Values.deploy.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            {{- include "modelship.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.deploy.resources | nindent 12 }}
          volumeMounts:
            - name: models-config
              mountPath: /etc/modelship
              readOnly: true
            {{- include "modelship.volumeMounts" . | nindent 12 }}
      volumes:
        - name: models-config
          configMap:
            name: {{ include "modelship.configMapName" . }}
        {{- include "modelship.volumes" . | nindent 8 }}
