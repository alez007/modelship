{{- $args := list "python" "/modelship/mship_deploy.py" "--use-existing-ray-cluster"
  "--gateway-name" (.Values.gateway.name | quote)
  "--config" "/etc/modelship/models.yaml"
  "--replace-strategy" .Values.deploy.replaceStrategy -}}
{{- if .Values.deploy.reconcile }}{{- $args = append $args "--reconcile" }}{{- end }}
{{- if not .Values.metrics.enabled }}{{- $args = append $args "--no-metrics" }}{{- end }}
{{- range .Values.deploy.extraArgs }}{{- $args = append $args . }}{{- end }}
apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: {{ include "modelship.fullname" . }}-deploy
  labels:
    {{- include "modelship.labels" . | nindent 4 }}
  annotations:
    # Re-run on install and every upgrade; delete the previous RayJob first so the
    # updated models.yaml is re-applied (a RayJob is otherwise immutable).
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  # Run against the existing RayCluster instead of creating one, and never tear
  # down a cluster we don't own. KubeRay waits for the cluster to be ready, then
  # submits the entrypoint to run ON the head (where a raylet exists).
  clusterSelector:
    ray.io/cluster: {{ include "modelship.fullname" . }}
  shutdownAfterJobFinishes: false
  # NB: backoffLimit is rejected by KubeRay in clusterSelector mode, so it is not set.
  {{- if .Values.deploy.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.deploy.ttlSecondsAfterFinished }}
  {{- end }}
  entrypoint: {{ join " " $args | quote }}
  # Submitter Job: pin to our image so its `ray job submit` CLI matches the
  # cluster's Ray version.
  submitterPodTemplate:
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ray-job-submitter
          image: {{ include "modelship.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.deploy.resources | nindent 12 }}
