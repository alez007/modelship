{{- if not .Values.secrets.existingSecret }}
{{- if or .Values.secrets.huggingfaceToken .Values.secrets.apiKeys }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "modelship.secretName" . }}
  labels:
    {{- include "modelship.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.huggingfaceToken }}
  HF_TOKEN: {{ .Values.secrets.huggingfaceToken | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKeys }}
  MSHIP_API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  {{- end }}
{{- end }}
{{- end }}
