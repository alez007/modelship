{{- if not .Values.secrets.existingSecret }}
{{- $inlineRedisPw := and .Values.redis.password (not .Values.redis.existingSecret) }}
{{- $inlineRayAuthToken := and .Values.rayAuth.token (not .Values.rayAuth.existingSecret) }}
{{- if or .Values.secrets.huggingfaceToken .Values.secrets.apiKeys $inlineRedisPw $inlineRayAuthToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "modelship.secretName" . }}
  labels:
    {{- include "modelship.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.huggingfaceToken }}
  HF_TOKEN: {{ .Values.secrets.huggingfaceToken | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKeys }}
  MSHIP_API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  {{- end }}
  {{- if $inlineRedisPw }}
  {{ .Values.redis.passwordKey }}: {{ .Values.redis.password | quote }}
  {{- end }}
  {{- if $inlineRayAuthToken }}
  {{ .Values.rayAuth.tokenKey }}: {{ .Values.rayAuth.token | quote }}
  {{- end }}
{{- end }}
{{- end }}
