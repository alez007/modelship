apiVersion: v1
kind: Service
metadata:
  name: {{ include "modelship.fullname" . }}-gateway
  labels:
    {{- include "modelship.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  # Load-balance across every Ray pod (head + workers), each running a Serve HTTP
  # proxy (proxy_location=EveryNode) — so ingress survives losing any single pod,
  # the head included. KubeRay stamps `ray.io/cluster` on every node pod; because
  # each Ray container declares a port named `serve`, KubeRay gates the pod's
  # readiness on a proxy /-/healthz check, so the Service only routes to a pod once
  # its proxy is up (and, via the gateway /readyz, once models are loaded).
  selector:
    ray.io/cluster: {{ include "modelship.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: serve
      protocol: TCP
