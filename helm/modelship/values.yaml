# Default values for the modelship chart.
# Topology: a KubeRay RayCluster (head + worker groups) plus a RayJob that submits
# mship_deploy.py to run on the head and deploy the models in models.yaml.

# -- Container image. Used by every Ray pod AND the RayJob submitter (they must
# share the exact image so the Ray/Python versions match across the cluster).
image:
  repository: ghcr.io/alez007/modelship
  # Bare release tag (no variant suffix); the chart appends "-cpu" when variant=cpu.
  # Stamped to the app version on release.
  tag: "0.6.0"
  # gpu (default) | cpu. GPU runs everywhere (CPU nodes just waste storage); a CPU
  # image on a GPU node fails for lack of CUDA, so gpu is the safe default. CPU-only
  # clusters set `variant: cpu`; a mixed cluster sets `variant: cpu` here and
  # `image.variant: gpu` on the GPU worker group.
  variant: gpu
  pullPolicy: IfNotPresent

# Secrets needed to pull the image (GHCR is public for this project, so usually empty).
imagePullSecrets: []

# Ray version baked into the image above. KubeRay compares this against the
# cluster and refuses mismatches — keep it in lockstep with the image.
rayVersion: "2.54.1"

# -- Optional bootstrap of the KubeRay operator + CRDs as a subchart.
# OFF by default: cluster-scoped, install-once, needs cluster-admin. Turn on for
# greenfield/single-tenant clusters; leave off where an admin manages KubeRay.
kuberay-operator:
  enabled: false

# -- Gateway: the OpenAI-compatible HTTP surface (Ray Serve proxy).
gateway:
  name: "modelship api"
  port: 8000
  # Number of gateway replicas (maps to mship_deploy.py --gateway-replicas /
  # MSHIP_GATEWAY_REPLICAS).
  replicas: 1

# -- Metrics exporter (Ray + modelship Prometheus metrics).
metrics:
  enabled: true
  port: 8079

redis:
  enabled: false
  # host:port of the Redis (e.g. "my-redis-master:6379").
  address: ""
  db: 0
  password: ""
  existingSecret: ""
  passwordKey: "REDIS_PASSWORD"
  # GCS external-storage namespace — pinned so a recreated cluster (same release)
  # recovers its state. Defaults to the release fullname.
  externalStorageNamespace: ""

# -- models.yaml. Either render the inline `config` into a ConfigMap, or point
# at an existing ConfigMap (key: models.yaml) you manage yourself.
models:
  existingConfigMap: ""
  # Inline models.yaml (ignored when existingConfigMap is set). Replace with your
  # real model set; see config/examples/ in the repo.
  config: |
    models: []

# -- Secrets: Hugging Face token (gated/private weights) and gateway API keys.
# Provide inline (rendered into a Secret) or reference an existing Secret with
# keys: HF_TOKEN, MSHIP_API_KEYS.
secrets:
  existingSecret: ""
  huggingfaceToken: ""
  # Comma-separated keys; when non-empty the gateway requires Authorization.
  apiKeys: ""

# -- Shared model-weight cache. vLLM/diffusers download weights here.
# Multi-node clusters REQUIRE ReadWriteMany so every worker shares one copy;
# a single-node cluster can use ReadWriteOnce.
cache:
  enabled: true
  # Reuse an existing PVC instead of templating one.
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 100Gi
  mountPath: /.cache

# -- /dev/shm. vLLM/NCCL use POSIX shared memory; the default 64Mi tmpfs is far
# too small and crashes engine startup. Sized as an emptyDir(memory) per pod.
shm:
  sizeLimit: 8Gi

# -- Pod security. The image runs unprivileged as UID/GID 1000; fsGroup lets the
# mounted cache PVC be group-writable by that user.
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Ray head: CPU-only coordination node. No models are scheduled here
# (num-gpus=0) so a GPU is never wasted on the GCS/dashboard/proxy.
head:
  # Overrides only — the chart already pins num-gpus=0, dashboard-host=0.0.0.0, and
  # metrics-export-port (=metrics.port) on the head. Add extra ray start flags here.
  rayStartParams: {}
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  annotations: {}


workerGroups: []
  # - name: gpu
  #   # Optional per-group image override. Maps to KubeRay's standard per-group pod
  #   # template (workerGroupSpecs[].template.containers[0].image) — set the top-level
  #   # `image.variant: cpu` (lean image cluster-wide) and override only the GPU group
  #   # with `variant: gpu`, so CPU nodes don't pull CUDA they never use. Any field
  #   # omitted here falls back to the top-level `image`. Both images must be the
  #   # same modelship release (same Ray version) or KubeRay rejects the cluster.
  #   image:
  #     variant: gpu           # GPU image for this group; top-level may be variant: cpu
  #   # On k3s/containerd the GPU group usually needs the NVIDIA RuntimeClass so the
  #   # GPU is injected. Omit where the GPU runtime is already the cluster default
  #   # (e.g. the NVIDIA GPU Operator). CPU groups never set this.
  #   runtimeClassName: nvidia
  #   replicas: 1
  #   minReplicas: 1
  #   maxReplicas: 1
  #   rayStartParams: {}
  #   resources:
  #     requests:
  #       cpu: "4"
  #       memory: 16Gi
  #       nvidia.com/gpu: "1"
  #     limits:
  #       cpu: "4"
  #       memory: 32Gi
  #       nvidia.com/gpu: "1"
  #   nodeSelector: {}
  #   tolerations:
  #     - key: nvidia.com/gpu
  #       operator: Exists
  #       effect: NoSchedule
  #   affinity: {}
  #   annotations: {}
  # - name: cpu
  #   replicas: 1
  #   minReplicas: 1
  #   maxReplicas: 1
  #   rayStartParams:
  #     num-gpus: "0"
  #   resources:
  #     requests:
  #       cpu: "4"
  #       memory: 8Gi
  #     limits:
  #       cpu: "6"
  #       memory: 16Gi
  #   nodeSelector: {}
  #   tolerations: []
  #   affinity: {}
  #   annotations: {}

# -- The deploy RayJob: submits mship_deploy.py to run on the head
# (--use-existing-ray-cluster), which deploys then exits. Re-run (helm upgrade)
# to apply models.yaml changes.
deploy:
  # Diff models.yaml against what this gateway already owns and remove the
  # difference (vs. additive default). Maps to mship_deploy.py --reconcile.
  reconcile: false
  # How to replace a model whose config changed (only takes effect during a
  # replace). blue_green: new alongside old, then drop old (no request loss,
  # peak resource = old+new). stop_start: drop old first (brief gap, no overlap).
  replaceStrategy: blue_green
  # Extra raw args appended to mship_deploy.py (e.g. ["--gateway-name", "edge"]).
  extraArgs: []
  # Clean up the finished RayJob automatically after N seconds (null = keep).
  ttlSecondsAfterFinished: null
  resources:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

# -- Gateway Service. ClusterIP by default; switch to LoadBalancer/NodePort to
# expose the OpenAI API outside the cluster. Load-balances across the Serve HTTP
# proxy on every Ray node (head + workers), gated per-pod by proxy health.
service:
  type: ClusterIP
  annotations: {}

# -- Prometheus Operator PodMonitor for the metrics port (optional). A PodMonitor
# (not ServiceMonitor) because every Ray pod — head and workers — exports on the
# metrics port, so scraping is per-pod by label rather than via one Service.
podMonitor:
  enabled: false
  interval: 30s
  labels: {}

# -- Prometheus Operator PrometheusRule with the modelship alert rules (request
# errors, latency, model-load failures, plus the HA control-plane and KubeRay
# alerts). Needs the Prometheus Operator CRDs; rules are synced from
# docs/prometheus-alerts.yml. `labels` should match your Prometheus's ruleSelector.
prometheusRule:
  enabled: false
  labels: {}

# -- Grafana dashboard as a ConfigMap, auto-imported by the Grafana sidecar that
# watches for the discovery label. Set `label`/`labelValue` to match your sidecar
# (kube-prometheus-stack defaults to grafana_dashboard: "1"). The dashboard's
# Gateway/Model/Node dropdowns let one dashboard serve multiple gateways.
grafanaDashboard:
  enabled: false
  label: grafana_dashboard
  labelValue: "1"
  extraLabels: {}
  # Optional folder placement via the sidecar's folder annotation (e.g.
  # "grafana_folder"); leave folderAnnotation empty to use the sidecar default.
  folderAnnotation: ""
  folder: "Modelship"
